---
- name: Setup Minimal Sway Environment (Universal)
  hosts: localhost
  connection: local
  become: true
  tasks:

    - name: Install core packages, Sway, and desktop utilities
      apt:
        name:
          - fastfetch
          - btrfsmaintenance
          - lxqt-policykit
          - sway-notification-center
          - thunar
          - distrobox
          - sway
          - swaybg
          - swayidle
          - swaylock
          - grimshot
          - foot
          - pipewire
          - wireplumber
          - pavucontrol
          - network-manager
          - systemd-zram-generator
          - xdg-desktop-portal-wlr
          - xdg-desktop-portal-gtk
          - fuzzel
          - git
          - flatpak
          - xwayland
          - firefox-esr
          - gamemode
          - fonts-font-awesome
          - fonts-noto-core
          - fonts-noto-mono
          - fonts-noto-color-emoji
          - gnome-disk-utility
          - network-manager-applet
          - power-profiles-daemon
          - ufw
          - cups
          - vim
          - stow
          - htop
          - waybar
          - libspa-0.2-bluetooth
          - bluez
          - blueman
        state: present
        update_cache: yes

    - name: Enable Flathub repository for the local user
      become: false
      shell: |
        flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      register: flathub_result
      changed_when: "'added' in flathub_result.stdout"

    - name: Fix NetworkManager "Unmanaged" status
      block:
        - name: Set NetworkManager to managed=true
          ini_file:
            path: /etc/NetworkManager/NetworkManager.conf
            section: ifupdown
            option: managed
            value: "true"

        - name: Comment out physical interfaces in legacy config
          replace:
            path: /etc/network/interfaces
            regexp: '^(allow-hotplug|iface|auto) (enp|wlp|eth|wlan)'
            replace: '# \1 \2'

        - name: Restart NetworkManager
          systemd:
            name: NetworkManager
            state: restarted

    - name: Configure systemd-zram-generator
      copy:
        dest: /etc/systemd/zram-generator.conf
        content: |
          [zram0]
          zram-size = min(ram / 2, 4096)
          compression-algorithm = zstd
          swap-priority = 100
        owner: root
        group: root
        mode: '0644'
      register: zram_config

    - name: Refresh systemd generator
      systemd:
        daemon_reload: yes
      when: zram_config.changed

    - name: Purge ghost root entry (Safely delete line only)
      lineinfile:
        path: /etc/fstab
        # If hostname is jdesktop, regex matches jlaptop (and vice versa)
        regexp: "^/dev/mapper/{{ 'jlaptop' if ansible_hostname == 'jdesktop' else 'jdesktop' }}--vg-root"
        state: absent

    - name: Optimize Btrfs Mounts (Host Aware)
      mount:
        path: "{{ item.mnt }}"
        src: "{{ item.dev }}"
        fstype: btrfs
        opts: "{{ item.opts }}"
        dump: "0"
        passno: "0"
        state: present  # "present" only modifies fstab; it does NOT trigger mount/umount
      loop:
        - { dev: "/dev/mapper/{{ ansible_hostname }}--vg-root", mnt: '/', opts: 'defaults,subvol=@rootfs,noatime,compress=zstd:1,ssd,discard=async,space_cache=v2,autodefrag' }
        - { dev: 'UUID=5efd422d-9ce0-49a4-b4b7-dfba42d9e434', mnt: '/mnt/z', opts: 'defaults,noatime,compress=zstd:1,ssd,discard=async,space_cache=v2,autodefrag,nosuid,nodev,nofail,x-gvfs-show,x-gvfs-name=z' }
        - { dev: 'UUID=d59767b0-cc74-4acc-93fb-25e24f53449e', mnt: '/mnt/g', opts: 'defaults,noatime,compress=zstd:1,ssd,discard=async,space_cache=v2,autodefrag,nosuid,nodev,nofail,x-gvfs-show,x-gvfs-name=g' }

    - name: Configure btrfsmaintenance
      lineinfile:
        path: /etc/default/btrfsmaintenance
        regexp: "^{{ item.key }}="
        line: '{{ item.key }}="{{ item.value }}"'
      loop:
        - { key: 'BTRFS_BALANCE_PERIOD', value: 'monthly' }
        - { key: 'BTRFS_SCRUB_PERIOD', value: 'monthly' }
        - { key: 'BTRFS_TRIM_PERIOD', value: 'none' }
      notify: Refresh btrfsmaintenance

    - name: Remove PulseAudio Bluetooth conflict
      apt:
        name: pulseaudio-module-bluetooth
        state: absent
        purge: yes

    - name: Enable Bluetooth
      systemd:
        name: bluetooth
        enabled: yes
        state: started

    - name: Configure Firewall Rules
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: '22000', proto: 'tcp' }
        - { port: '22000', proto: 'udp' }
        - { port: '21027', proto: 'udp' }

    - name: Enable Firewall
      ufw:
        state: enabled

    - name: Restart User PipeWire
      become: false
      systemd:
        name: "{{ item }}"
        state: restarted
        scope: user
      loop:
        - pipewire
        - pipewire-pulse
        - wireplumber

  handlers:
    - name: Refresh btrfsmaintenance
      shell: |
        if [ -x /usr/share/btrfsmaintenance/btrfsmaintenance-refresh-cron.sh ]; then
          /usr/share/btrfsmaintenance/btrfsmaintenance-refresh-cron.sh
        fi
        systemctl daemon-reload

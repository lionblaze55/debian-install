---
- name: Setup Minimal Sway Environment on Debian 13
  hosts: localhost
  connection: local
  become: true
  tasks:

    - name: Install core packages, Sway, and desktop utilities
      apt:
        name:
          - fastfetch
          - btrfsmaintenance
          - lxqt-policykit
          - sway-notification-center
          - thunar
          - distrobox
          - sway
          - swaybg
          - swayidle
          - swaylock
          - grimshot
          - foot
          - pipewire
          - wireplumber
          - pavucontrol
          - network-manager
          - systemd-zram-generator
          - xdg-desktop-portal-wlr
          - xdg-desktop-portal-gtk
          - fuzzel
          - git
          - flatpak
          - xwayland
          - firefox-esr
          - gamemode
          - fonts-font-awesome
          - fonts-noto-core
          - fonts-noto-mono
          - fonts-noto-color-emoji
          - gnome-disk-utility
          - network-manager-applet
          - power-profiles-daemon
          - ufw
          - cups
          - vim
          - stow
          - htop
          - waybar
          - libspa-0.2-bluetooth
          - bluez
          - blueman
        state: present
        update_cache: yes

    - name: Remove conflicting PulseAudio Bluetooth module
      apt:
        name: pulseaudio-module-bluetooth
        state: absent
        purge: yes

    - name: Enable and start Bluetooth service
      systemd:
        name: bluetooth
        enabled: yes
        state: started

    - name: Configure UFW rules for Discord/Syncthing and Arma 3
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: '22000', proto: 'tcp' } # Discord/Syncthing
        - { port: '22000', proto: 'udp' }
        - { port: '21027', proto: 'udp' }
        # Add Arma 3 ports here if needed, e.g.:
        # - { port: '2302', proto: 'udp' } 

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Restart PipeWire services (User level)
      become: false
      systemd:
        name: "{{ item }}"
        state: restarted
        scope: user
      loop:
        - pipewire
        - pipewire-pulse
        - wireplumber

    - name: Configure systemd-zram-generator defaults
      copy:
        dest: /etc/systemd/zram-generator.conf
        content: |
          [zram0]
          # Sets zRAM size to half of available RAM, capped at 4GB
          zram-size = min(ram / 2, 4096)
          compression-algorithm = zstd
          swap-priority = 100
          mount-point = /dev/zram0
        owner: root
        group: root
        mode: '0644'
      register: zram_config

    - name: Refresh systemd generator and start zram
      shell: |
        systemctl daemon-reload
        systemctl start /dev/zram0
      when: zram_config.changed

    - name: Optimize Btrfs mount options in fstab
      replace:
        path: /etc/fstab
        regexp: '(btrfs\s+)(defaults|subvol=[^\s,]+)(.*?\s+0\s+[0-9])'
        replace: '\1\2,noatime,compress=zstd:1,ssd,discard=async,space_cache=v2,autodefrag\3'
      notify: Remount all filesystems

    - name: Configure btrfsmaintenance services
      lineinfile:
        path: /etc/default/btrfsmaintenance
        regexp: "^{{ item.key }}="
        line: '{{ item.key }}="{{ item.value }}"'
      loop:
        - { key: 'BTRFS_BALANCE_PERIOD', value: 'monthly' }
        - { key: 'BTRFS_SCRUB_PERIOD', value: 'monthly' }
        - { key: 'BTRFS_TRIM_PERIOD', value: 'none' } # Set to none because we use discard=async
      notify: Refresh btrfsmaintenance

  handlers:
    - name: Remount all filesystems
      shell: mount -a

    - name: Refresh btrfsmaintenance
      shell: btrfsmaintenance-refresh-cron.sh

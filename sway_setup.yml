---
- name: Setup Minimal Sway Environment (Universal)
  hosts: localhost
  connection: local
  become: true
  tasks:

    - name: Install core packages, Sway, and desktop utilities
      apt:
        name:
          - brightnessctl
          - adwaita-icon-theme-full
          - xdg-user-dirs
          - fastfetch
          - btrfsmaintenance
          - lxqt-policykit
          - sway-notification-center
          - thunar
          - distrobox
          - sway
          - swaybg
          - swayidle
          - swaylock
          - grimshot
          - foot
          - pipewire
          - wireplumber
          - pavucontrol
          - network-manager
          - systemd-zram-generator
          - xdg-desktop-portal-wlr
          - xdg-desktop-portal-gtk
          - fuzzel
          - git
          - flatpak
          - xwayland
          - firefox-esr
          - gamemode
          - fonts-font-awesome
          - fonts-noto-core
          - fonts-noto-mono
          - fonts-noto-color-emoji
          - gnome-disk-utility
          - network-manager-applet
          - power-profiles-daemon
          - ufw
          - cups
          - vim
          - stow
          - htop
          - waybar
          - libspa-0.2-bluetooth
          - bluez
          - blueman
        state: present
        update_cache: yes
        cache_valid_time: 3600

    - name: Enable Flathub repository for the local user
      become: false
      flatpak_remote:
        name: flathub
        state: present
        method: user
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install host-specific Flatpaks (Safe Lookup)
      become: false
      flatpak:
        name: "{{ item }}"
        method: user
        state: present
        remote: flathub
      loop: "{{ lookup('file', ansible_hostname + '/flatpak.txt', errors='ignore').split('\n') | reject('equalto', '') | list }}"
      when: lookup('file', ansible_hostname + '/flatpak.txt', errors='ignore') != ""

    - name: System Cleanup
      apt:
        autoremove: yes
        purge: yes

    - name: Flatpak Cleanup
      become: false
      command: flatpak uninstall --unused -y
      changed_when: false

    - name: Add the current Ansible user to lpadmin group
      ansible.builtin.user:
        name: "{{ lookup('env', 'USER') }}"
        groups: lpadmin
        append: yes
      become: yes
  
    - name: Configure NetworkManager
      block:
        - name: Set NetworkManager to managed=true
          ini_file:
            path: /etc/NetworkManager/NetworkManager.conf
            section: ifupdown
            option: managed
            value: "true"

        - name: Comment out physical interfaces in legacy config
          replace:
            path: /etc/network/interfaces
            regexp: '^(allow-hotplug|iface|auto) (enp|wlp|eth|wlan)'
            replace: '# \1 \2'

        - name: Restart NetworkManager
          systemd:
            name: NetworkManager
            state: restarted

    - name: Configure systemd-zram-generator
      copy:
        dest: /etc/systemd/zram-generator.conf
        content: |
          [zram0]
          zram-size = min(ram / 2, 4096)
          compression-algorithm = zstd
          swap-priority = 100
        owner: root
        group: root
        mode: '0644'
      register: zram_config

    - name: Refresh systemd generator
      systemd:
        daemon_reload: yes
      when: zram_config.changed

    - name: Purge incorrect root entries from fstab
      lineinfile:
        path: /etc/fstab
        regexp: "^/dev/mapper/(?!{{ ansible_hostname }}--vg-root).+--vg-root"
        state: absent

    - name: Optimize Root Btrfs Mount
      mount:
        path: '/'
        src: "/dev/mapper/{{ ansible_hostname }}--vg-root"
        fstype: btrfs
        opts: 'defaults,subvol=@rootfs,noatime,compress=zstd:1,ssd,discard=async,space_cache=v2,autodefrag'
        dump: "0"
        passno: "0"
        state: present

    - name: Dynamically Optimize Non-Root Btrfs Mounts (Persistent via UUID)
      mount:
        path: "{{ item.mount }}"
        # Use UUID instead of /dev/sdX to prevent issues when drive order changes
        src: "UUID={{ item.uuid }}"
        fstype: btrfs
        opts: "defaults,noatime,compress=zstd:1,ssd,discard=async,space_cache=v2,autodefrag,nosuid,nodev,nofail"
        dump: "0"
        passno: "0"
        state: present
      loop: "{{ ansible_mounts }}"
      when: 
        - item.fstype == 'btrfs'
        - item.mount != '/'
        - "'vg-root' not in item.device"
        - item.uuid is defined

    - name: Enable Btrfs maintenance timers
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - btrfs-scrub.timer
        - btrfs-balance.timer

    - name: Configure btrfsmaintenance
      lineinfile:
        path: /etc/default/btrfsmaintenance
        regexp: "^{{ item.key }}="
        line: '{{ item.key }}="{{ item.value }}"'
      loop:
        - { key: 'BTRFS_BALANCE_PERIOD', value: 'monthly' }
        - { key: 'BTRFS_SCRUB_PERIOD', value: 'monthly' }
        - { key: 'BTRFS_TRIM_PERIOD', value: 'none' }
      notify: Refresh btrfsmaintenance

    - name: Remove PulseAudio Bluetooth conflict
      apt:
        name: pulseaudio-module-bluetooth
        state: absent
        purge: yes

    - name: Enable Bluetooth
      systemd:
        name: bluetooth
        enabled: yes
        state: started

    - name: Enable lingering for local user
      command: "loginctl enable-linger {{ ansible_user_id }}"
      args:
        creates: "/var/lib/systemd/linger/{{ ansible_user_id }}"

    - name: Ensure User PipeWire services are running
      become: false
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
        scope: user
      loop:
        - pipewire
        - pipewire-pulse
        - wireplumber

    - name: Configure Firewall Rules
      ufw:
        rule: allow
        port: "{{ item.port | string }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: 22000, proto: 'tcp' }
        - { port: 22000, proto: 'udp' }
        - { port: 21027, proto: 'udp' }

    - name: Enable Firewall
      ufw:
        state: enabled

  handlers:
    - name: Refresh btrfsmaintenance
      shell: |
        if [ -x /usr/share/btrfsmaintenance/btrfsmaintenance-refresh-cron.sh ]; then
          /usr/share/btrfsmaintenance/btrfsmaintenance-refresh-cron.sh
        fi
        systemctl daemon-reload

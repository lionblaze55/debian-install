---
- name: Setup Minimal Sway Environment on Debian 13
  hosts: localhost
  connection: local
  become: true
  tasks:

    - name: Install core packages, Sway, and desktop utilities
      apt:
        name:
          - fastfetch
          - btrfsmaintenance
          - lxqt-policykit
          - sway-notification-center
          - thunar
          - distrobox
          - sway
          - swaybg
          - swayidle
          - swaylock
          - grimshot
          - foot
          - pipewire
          - wireplumber
          - pavucontrol
          - network-manager
          - systemd-zram-generator
          - xdg-desktop-portal-wlr
          - xdg-desktop-portal-gtk
          - fuzzel
          - git
          - flatpak
          - xwayland
          - firefox-esr
          - gamemode
          - fonts-font-awesome
          - fonts-noto-core
          - fonts-noto-mono
          - fonts-noto-color-emoji
          - gnome-disk-utility
          - network-manager-applet
          - power-profiles-daemon
          - ufw
          - cups
          - vim
          - stow
          - htop
          - waybar
          - libspa-0.2-bluetooth
          - bluez
          - blueman
        state: present
        update_cache: yes

    - name: Fix NetworkManager "Unmanaged" status
      block:
        - name: Allow NetworkManager to manage interfaces in /etc/NetworkManager/NetworkManager.conf
          ini_file:
            path: /etc/NetworkManager/NetworkManager.conf
            section: ifupdown
            option: managed
            value: "true"

        - name: Comment out physical interfaces in /etc/network/interfaces to prevent conflicts
          replace:
            path: /etc/network/interfaces
            regexp: '^(allow-hotplug|iface|auto) (enp|wlp|eth|wlan)'
            replace: '# \1 \2'

        - name: Restart NetworkManager to pick up changes
          systemd:
            name: NetworkManager
            state: restarted

    - name: Configure systemd-zram-generator
      copy:
        dest: /etc/systemd/zram-generator.conf
        content: |
          [zram0]
          zram-size = min(ram / 2, 4096)
          compression-algorithm = zstd
          swap-priority = 100
        owner: root
        group: root
        mode: '0644'
      register: zram_config

    - name: Refresh systemd generator
      systemd:
        daemon_reload: yes
      when: zram_config.changed

    - name: Clean and Optimize Btrfs FSTAB entries
      lineinfile:
        path: /etc/fstab
        regexp: "^{{ item.dev | regex_escape }}.*btrfs"
        line: "{{ item.dev }} {{ item.mnt }} btrfs {{ item.opts }} 0 {{ item.pass }}"
      loop:
        - { dev: '/dev/mapper/jdesktop--vg-root', mnt: '/', opts: 'defaults,subvol=@rootfs,noatime,compress=zstd:1,ssd,discard=async,space_cache=v2,autodefrag', pass: '0' }
        - { dev: 'UUID=5efd422d-9ce0-49a4-b4b7-dfba42d9e434', mnt: '/mnt/z', opts: 'defaults,noatime,compress=zstd:1,ssd,discard=async,space_cache=v2,autodefrag,nosuid,nodev,nofail,x-gvfs-show,x-gvfs-name=z', pass: '0' }
        - { dev: 'UUID=d59767b0-cc74-4acc-93fb-25e24f53449e', mnt: '/mnt/g', opts: 'defaults,noatime,compress=zstd:1,ssd,discard=async,space_cache=v2,autodefrag,nosuid,nodev,nofail,x-gvfs-show,x-gvfs-name=g', pass: '0' }
      notify: Remount all filesystems

    - name: Configure btrfsmaintenance periods
      lineinfile:
        path: /etc/default/btrfsmaintenance
        regexp: "^{{ item.key }}="
        line: '{{ item.key }}="{{ item.value }}"'
      loop:
        - { key: 'BTRFS_BALANCE_PERIOD', value: 'monthly' }
        - { key: 'BTRFS_SCRUB_PERIOD', value: 'monthly' }
        - { key: 'BTRFS_TRIM_PERIOD', value: 'none' }
      notify: Refresh btrfsmaintenance

    - name: Remove conflicting PulseAudio Bluetooth module
      apt:
        name: pulseaudio-module-bluetooth
        state: absent
        purge: yes

    - name: Enable and start Bluetooth service
      systemd:
        name: bluetooth
        enabled: yes
        state: started

    - name: Configure UFW rules
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: '22000', proto: 'tcp' }
        - { port: '22000', proto: 'udp' }
        - { port: '21027', proto: 'udp' }

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Restart PipeWire services (User level)
      become: false
      systemd:
        name: "{{ item }}"
        state: restarted
        scope: user
      loop:
        - pipewire
        - pipewire-pulse
        - wireplumber

  handlers:
    - name: Remount all filesystems
      shell: mount -a

    - name: Refresh btrfsmaintenance
      shell: |
        if [ -x /usr/share/btrfsmaintenance/btrfsmaintenance-refresh-cron.sh ]; then
          /usr/share/btrfsmaintenance/btrfsmaintenance-refresh-cron.sh
        fi
        systemctl daemon-reload
